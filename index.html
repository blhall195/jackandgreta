document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {

    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
  }

  // NOTE: this is a light-touch gate, not real security. The bundled content

  const PASSWORD = 'Juno';

      '<div id="__gate_err" style="height:16px;font-size:12px;color:#CE5A43;margin:8px 0 0;"></div>' +
      '<button id="__gate_btn" style="margin-top:10px;width:100%;padding:10px;font-size:15px;color:#fff;background:#8A9061;border:none;border-radius:8px;cursor:pointer;">Enter</button>' +
    '</div>';
  document.body.appendChild(gate);

  const gateInput = gate.querySelector('#__gate_input');
  const gateErr = gate.querySelector('#__gate_err');
  const gateBtn = gate.querySelector('#__gate_btn');

  function gateAttempt() {
    if (gateInput.value === PASSWORD) {
      gate.remove();
      unpack();
    } else {
      gateErr.textContent = 'Incorrect password';
      gateInput.value = '';
      gateInput.focus();
    }
  }
  gateBtn.addEventListener('click', gateAttempt);
  gateInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') gateAttempt(); });
  gateInput.focus();
});

><\u002Fdiv>\n\n    <!-- rsvp -->\n    <div id=\"rsvp\" style=\"padding:50px 56px 70px; text-align:center;\">\n      <div style=\"font-family:Jost,sans-serif; font-size:11.5px; letter-spacing:.34em; text-transform:uppercase; color:#889063; margin-bottom:8px;\">Friday 20 August 2027 · 5pm 'til midnight<\u002Fdiv>\n      <div style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:40px; color:#3A3326;\">We hope you can make it<\u002Fdiv>\n      <a href=\"#\" style=\"display:inline-block; margin-top:26px; font-family:Jost,sans-serif; font-size:12px; letter-spacing:.24em; text-transform:uppercase; color:#3A3326; border:1.5px solid #CE5A43; padding:14px 38px; text-decoration:none;\">RSVP<\u002Fa>\n      <div style=\"font-family:Jost,sans-serif; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#889063; margin-top:34px;\">Camp &amp; Furnace · 67 Greenland Street · Liverpool · L1 0BY<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- divider -->\n    <div style=\"position:relative; height:30px; width:170px; margin:0 auto;\"><svg data-wavy=\"line\" data-amp=\"6\" data-wave=\"22\" data-color=\"#889063\" data-sw=\"2.2\" style=\"position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none;\" preserveAspectRatio=\"none\"><path fill=\"none\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n    <!-- more info -->\n    <div id=\"info\" style=\"padding:50px 56px 66px;\">\n      <div style=\"text-align:center; font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:500; font-size:38px; color:#757A52; margin-bottom:46px;\">Good to know<\u002Fdiv>\n      <div style=\"max-width:600px; margin:0 auto; display:flex; flex-direction:column; gap:42px;\">\n        <div style=\"text-align:center;\">\n          <div style=\"font-family:Jost,sans-serif; font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#CE5A43; margin-bottom:14px;\">Venue<\u002Fdiv>\n          <div style=\"font-family:Jost,sans-serif; font-weight:300; font-size:15px; line-height:1.8; color:#3A3326;\">We're getting married at Camp &amp; Furnace in the Baltic Triangle. There's limited parking outside, but several local car parks nearby such as King's Dock and Cains Brewery. It's also around a 20-minute walk from James Street, Lime Street and Liverpool Central stations.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <div style=\"font-family:Jost,sans-serif; font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#CE5A43; margin-bottom:14px;\">Gifts<\u002Fdiv>\n          <div style=\"font-family:Jost,sans-serif; font-weight:300; font-size:15px; line-height:1.8; color:#3A3326;\">Your presence is all the present we need! But should you wish to bring a gift, a donation towards our honeymoon would be much appreciated.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;\">\n          <div style=\"font-family:Jost,sans-serif; font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:#CE5A43; margin-bottom:14px;\">Dress Code<\u002Fdiv>\n          <div style=\"font-family:Jost,sans-serif; font-weight:300; font-size:15px; line-height:1.8; color:#3A3326;\">Usual wedding attire — but summer colours encouraged!<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- divider -->\n    <div style=\"position:relative; height:30px; width:170px; margin:0 auto;\"><svg data-wavy=\"line\" data-amp=\"6\" data-wave=\"22\" data-color=\"#889063\" data-sw=\"2.2\" style=\"position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none;\" preserveAspectRatio=\"none\"><path fill=\"none\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n\n    <!-- gallery -->\n    <div id=\"gallery\" style=\"padding:50px 56px 70px;\">\n      <div style=\"text-align:center; font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:500; font-size:38px; color:#757A52; margin-bottom:40px;\">A few of our favourites<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;\">\n        <div style=\"aspect-ratio:3/4; background-image:repeating-linear-gradient(135deg, rgba(137,144,99,.15) 0 2px, transparent 2px 13px); display:flex; align-items:flex-end; justify-content:center; padding:10px;\"><span style=\"font-family:monospace; font-size:9.5px; color:#889063;\">us<\u002Fspan><\u002Fdiv>\n        <div style=\"aspect-ratio:3/4; background-image:repeating-linear-gradient(135deg, rgba(206,90,67,.14) 0 2px, transparent 2px 13px); display:flex; align-items:flex-end; justify-content:center; padding:10px;\"><span style=\"font-family:monospace; font-size:9.5px; color:#CE5A43;\">the proposal<\u002Fspan><\u002Fdiv>\n        <div style=\"aspect-ratio:3/4; background-image:repeating-linear-gradient(135deg, rgba(137,144,99,.15) 0 2px, transparent 2px 13px); display:flex; align-items:flex-end; justify-content:center; padding:10px;\"><span style=\"font-family:monospace; font-size:9.5px; color:#889063;\">the venue<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- footer -->\n    <div style=\"padding:34px; text-align:center; font-family:'Caveat',cursive; font-size:26px; color:#CE5A43; border-top:1px solid rgba(58,51,38,.1);\">Greta &amp; Jack · 20.08.27<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    const draw = () => this.drawAll();\n    draw();\n    this._ro = new ResizeObserver(draw);\n    document.querySelectorAll('svg[data-wavy]').forEach(svg => {\n      if (svg.parentElement) this._ro.observe(svg.parentElement);\n    });\n    window.addEventListener('resize', draw);\n    if (document.fonts && document.fonts.ready) document.fonts.ready.then(draw);\n    setTimeout(draw, 300);\n  }\n  componentWillUnmount(){ if (this._ro) this._ro.disconnect(); }\n\n  wavyRect(w, h, amp, wl){\n    const inset = amp + 2;\n    const x0 = inset, y0 = inset, x1 = w - inset, y1 = h - inset;\n    const wave = (d) => amp * Math.sin((d / wl) * 2 * Math.PI);\n    const step = 3;\n    const pts = [];\n    for (let x = x0; x <= x1; x += step) pts.push([x, y0 + wave(x - x0)]);\n    for (let y = y0; y <= y1; y += step) pts.push([x1 - wave(y - y0), y]);\n    for (let x = x1; x >= x0; x -= step) pts.push([x, y1 - wave(x1 - x)]);\n    for (let y = y1; y >= y0; y -= step) pts.push([x0 + wave(y1 - y), y]);\n    let d = 'M' + pts[0][0].toFixed(1) + ' ' + pts[0][1].toFixed(1);\n    for (let i = 1; i < pts.length; i++) d += ' L' + pts[i][0].toFixed(1) + ' ' + pts[i][1].toFixed(1);\n    return d + ' Z';\n  }\n\n  wavyLine(w, h, amp, wl){\n    const mid = h / 2;\n    let d = 'M0 ' + mid.toFixed(1);\n    for (let x = 0; x <= w; x += 3) d += ' L' + x.toFixed(1) + ' ' + (mid + amp * Math.sin((x / wl) * 2 * Math.PI)).toFixed(1);\n    return d;\n  }\n\n  drawAll(){\n    document.querySelectorAll('svg[data-wavy]').forEach(svg => {\n      const host = svg.parentElement;\n      if (!host) return;\n      const w = host.clientWidth, h = host.clientHeight;\n      if (!w || !h) return;\n      const amp = parseFloat(svg.dataset.amp) || 8;\n      const wl = parseFloat(svg.dataset.wave) || 32;\n      const path = svg.querySelector('path');\n      svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);\n      path.setAttribute('d', svg.dataset.wavy === 'line' ? this.wavyLine(w, h, amp, wl) : this.wavyRect(w, h, amp, wl));\n      path.setAttribute('stroke', svg.dataset.color || '#CE5A43');\n      path.setAttribute('stroke-width', svg.dataset.sw || '2.4');\n    });\n  }\n\n  renderVals(){ return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
